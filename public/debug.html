<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Assistant - Admin Debug</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #0f172a;
      background: #f8fafc;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(640px, 100%);
      border: 1px solid #dbe3ea;
      border-radius: 8px;
      background: #ffffff;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.65rem;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: #475569;
      line-height: 1.55;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input {
      flex: 1;
      min-width: 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 12px;
      font-size: 1rem;
    }
    button, a.button {
      border: 0;
      border-radius: 6px;
      padding: 12px 16px;
      background: #0f766e;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .secondary {
      display: inline-block;
      margin-top: 16px;
      color: #0f766e;
      text-decoration: none;
      font-weight: 700;
    }
    .status {
      margin-top: 14px;
      color: #991b1b;
      font-size: 0.9rem;
      min-height: 1.2rem;
    }
    @media (max-width: 560px) {
      .row { flex-direction: column; align-items: stretch; }
      button, a.button { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Admin debug moved</h1>
    <p>Agent communication history is available from the role-protected Admin Flow panel. Sign in with an authorized admin account to inspect a session.</p>
    <label for="sessionId">Session ID</label>
    <div class="row">
      <input type="text" id="sessionId" placeholder="Paste a session ID" autocomplete="off" />
      <button type="button" id="openAdminBtn">Open Admin Flow</button>
    </div>
    <div id="status" class="status" aria-live="polite"></div>
    <a class="secondary" href="admin.html">Open Admin</a>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('sessionId');
    const input = document.getElementById('sessionId');
    const statusEl = document.getElementById('status');
    if (sessionId) input.value = sessionId;

    function openAdminFlow() {
      const id = input.value.trim();
      if (!id) {
        statusEl.textContent = 'Enter a session ID first.';
        return;
      }
      window.location.href = 'admin.html?sessionId=' + encodeURIComponent(id) + '#flow';
    }

    document.getElementById('openAdminBtn').onclick = openAdminFlow;
    input.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        openAdminFlow();
      }
    });
  </script>
</body>
</html>
