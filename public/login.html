<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Shop Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal-900: #0f766e;
      --teal-700: #0d9488;
      --teal-600: #0d9488;
      --teal-500: #14b8a6;
      --slate-950: #020617;
      --slate-800: #1e293b;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --white: #ffffff;
      --red-700: #b91c1c;
      --red-50: #fef2f2;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      color: var(--slate-950);
      line-height: 1.6;
      background: var(--slate-100);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .auth-container {
      background: var(--white);
      padding: 2.5rem;
      border: 1px solid var(--slate-200);
      border-radius: 0.5rem;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      max-width: 430px;
      width: 100%;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--slate-600);
      text-decoration: none;
      font-size: 0.875rem;
    }
    .back-link:hover { color: var(--teal-700); }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--teal-900);
      margin-bottom: 0.75rem;
    }
    .copy {
      color: var(--slate-600);
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 3rem;
      padding: 0.75rem 1rem;
      background: var(--teal-600);
      color: var(--white);
      border: 0;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--teal-700); }
    .secondary-link {
      display: block;
      margin-top: 1rem;
      text-align: center;
      color: var(--teal-700);
      font-weight: 600;
      text-decoration: none;
    }
    .secondary-link:hover { text-decoration: underline; }
    .notice {
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: var(--red-50);
      border: 1px solid rgba(185, 28, 28, 0.2);
      border-radius: 0.375rem;
      color: var(--red-700);
      font-size: 0.875rem;
      display: none;
    }
    .notice.show { display: block; }
    .meta {
      margin-top: 1.25rem;
      color: var(--slate-500);
      font-size: 0.8125rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="auth-container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>Sign in</h1>
    <p class="copy">Shop Assistant uses Alfares Auth for credentials, sessions, and account protection. Continue there to access your dashboard.</p>
    <button type="button" class="btn" id="continueBtn">Continue with Auth</button>
    <a href="register.html" class="secondary-link">Create an account</a>
    <div id="notice" class="notice" role="alert"></div>
    <p class="meta">No password is collected by this page.</p>
  </main>

  <script>
    const AUTH_BASE = 'https://auth.alfares.cz';
    const CLIENT_ID = 'shop-assistant';
    const STATE_KEY = 'shop_assistant_auth_state';

    function buildAuthUrl(path) {
      const state = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
      sessionStorage.setItem(STATE_KEY, state);
      const returnUrl = new URL('dashboard.html', window.location.href).href;
      const params = new URLSearchParams({ return_url: returnUrl, client_id: CLIENT_ID, state });
      return AUTH_BASE + path + '?' + params.toString();
    }

    function showNotice(message) {
      const notice = document.getElementById('notice');
      notice.textContent = message;
      notice.classList.add('show');
    }

    function continueWithAuth() {
      try {
        window.location.href = buildAuthUrl('/login');
      } catch (error) {
        showNotice('Could not start sign-in. Please open the customer dashboard and try again.');
      }
    }

    document.getElementById('continueBtn').addEventListener('click', continueWithAuth);
    continueWithAuth();
  </script>
</body>
</html>
