apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-assistant-config
  namespace: statex-apps
  labels:
    app: shop-assistant
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "shop-assistant"
  DOMAIN: "shop-assistant.alfares.cz"
  PORT: "4500"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "shop_assistant"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  # TIMEOUT_MS: "30000"
