apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-assistant-config
  namespace: statex-apps
  labels:
    app: shop-assistant
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "shop-assistant"
  DOMAIN: "shop-assistant.alfares.cz"
  PORT: "4500"
  AI_SERVICE_URL: "http://ai-microservice.statex-apps.svc.cluster.local:3380"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  LEADS_SERVICE_URL: "http://leads-microservice.statex-apps.svc.cluster.local:4400"
  AUTH_SERVICE_TIMEOUT: "15000"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "shop_assistant"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  PAYMENTS_SERVICE_URL: "http://payments-microservice:3468"
  PAYMENT_SERVICE_URL: "http://payments-microservice:3468"
  SHOP_ASSISTANT_PUBLIC_BASE_URL: "https://shop-assistant.alfares.cz"
  SHOP_ASSISTANT_BILLING_ENABLE_PAYMENT_CREATE: "false"
  # TIMEOUT_MS: "30000"
